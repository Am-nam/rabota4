{% extends 'base.html' %}

{% block content %}

<h2>Вход</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Логин"><br><br>

    <input type="password" name="password" placeholder="Пароль"><br><br>

    <button type="submit">Войти</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% endblock %}
